<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カロリー管理">
<meta name="theme-color" content="#f5f5f7">
<title>カロリー管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f0f0f5;
    --accent: #ff5a36;
    --accent2: #ff9f1c;
    --green: #22c55e;
    --text: #1a1a2e;
    --muted: #9090b0;
    --border: #e0e0ea;
    --radius: 16px;
  }

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
min-height: 100dvh;
max-width: 430px;
margin: 0 auto;
position: relative;
overflow-x: hidden;
}

h1, h2, h3 { font-family: ‘Syne’, sans-serif; }

/* ── APP SHELL ── */
#app { padding-bottom: 80px; min-height: 100dvh; }

/* ── NAV ── */
nav {
position: fixed;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 100%; max-width: 430px;
background: rgba(255,255,255,0.95);
backdrop-filter: blur(20px);
border-top: 1px solid var(–border);
display: flex;
z-index: 100;
padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
}

.nav-btn {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
padding: 6px 0;
background: none;
border: none;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 10px;
cursor: pointer;
transition: color .2s;
}

.nav-btn.active { color: var(–accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* ── HEADER ── */
.page-header {
padding: 56px 20px 20px;
background: linear-gradient(180deg, var(–surface) 0%, transparent 100%);
}

.page-title {
font-size: 28px;
font-weight: 800;
letter-spacing: -0.5px;
}

.page-subtitle { font-size: 14px; color: var(–muted); margin-top: 4px; }

/* ── TODAY ── */
.ring-card {
margin: 0 20px;
background: var(–surface);
border-radius: 24px;
padding: 28px;
display: flex;
align-items: center;
gap: 24px;
border: 1px solid var(–border);
}

.ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }

.ring-wrap svg { transform: rotate(-90deg); }

.ring-bg { fill: none; stroke: #e8e8f0; stroke-width: 10; }
.ring-fg { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }

.ring-label {
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%,-50%);
text-align: center;
}

.ring-cal { font-family: ‘Syne’, sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
.ring-unit { font-size: 10px; color: var(–muted); margin-top: 2px; }

.ring-info { flex: 1; }
.ring-info .label { font-size: 12px; color: var(–muted); margin-bottom: 4px; }
.ring-info .value { font-family: ‘Syne’, sans-serif; font-size: 18px; font-weight: 700; }

.info-row { margin-bottom: 12px; }
.info-row:last-child { margin-bottom: 0; }

.pct-bar {
height: 4px;
background: var(–surface2);
border-radius: 2px;
margin-top: 6px;
overflow: hidden;
}

.pct-fill {
height: 100%;
border-radius: 2px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── SECTION ── */
.section {
margin: 20px 20px 0;
}

.section-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
}

.section-title {
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 700;
}

.btn-text {
background: none;
border: none;
color: var(–accent);
font-family: ‘DM Sans’, sans-serif;
font-size: 13px;
cursor: pointer;
}

/* ── FOOD LIST ── */
.food-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px 16px;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 8px;
}

.food-name { font-size: 15px; font-weight: 500; }
.food-tag { font-size: 11px; color: var(–muted); margin-top: 2px; }
.food-cal { font-family: ‘Syne’, sans-serif; font-size: 18px; font-weight: 700; color: var(–accent); }
.food-cal span { font-size: 11px; font-weight: 400; color: var(–muted); }

.food-del {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
padding: 4px;
border-radius: 6px;
transition: color .2s;
margin-left: 8px;
}

.food-del:active { color: #ff4a4a; }

.empty-state {
text-align: center;
color: var(–muted);
padding: 32px 0;
font-size: 14px;
}

/* ── FAB ── */
.fab {
position: fixed;
bottom: calc(80px + env(safe-area-inset-bottom));
right: 20px;
width: 56px; height: 56px;
border-radius: 50%;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border: none;
color: white;
font-size: 28px;
cursor: pointer;
box-shadow: 0 4px 20px rgba(255,107,74,.4);
display: flex;
align-items: center;
justify-content: center;
transition: transform .15s;
z-index: 90;
}

.fab:active { transform: scale(0.92); }

/* ── MODAL ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,.4);
backdrop-filter: blur(8px);
z-index: 200;
display: flex;
align-items: flex-end;
opacity: 0;
pointer-events: none;
transition: opacity .25s;
}

.modal-overlay.open {
opacity: 1;
pointer-events: all;
}

.modal {
background: var(–surface);
border-radius: 24px 24px 0 0;
width: 100%;
max-width: 430px;
margin: 0 auto;
padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
transform: translateY(100%);
transition: transform .3s cubic-bezier(.4,0,.2,1);
}

.modal-overlay.open .modal {
transform: translateY(0);
}

.modal-handle {
width: 40px; height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 20px;
}

.modal-title {
font-family: ‘Syne’, sans-serif;
font-size: 20px;
font-weight: 700;
margin-bottom: 20px;
}

/* ── TABS ── */
.tabs {
display: flex;
background: var(–surface2);
border-radius: 10px;
padding: 4px;
margin-bottom: 20px;
}

.tab {
flex: 1;
padding: 8px;
border: none;
background: none;
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
border-radius: 7px;
cursor: pointer;
transition: all .2s;
}

.tab.active {
background: var(–surface);
color: var(–text);
font-weight: 500;
}

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(–muted); margin-bottom: 6px; display: block; }

.form-input {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 14px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
outline: none;
transition: border-color .2s;
}

.form-input:focus { border-color: var(–accent); }

.btn-primary {
width: 100%;
background: linear-gradient(135deg, var(–accent), var(–accent2));
border: none;
border-radius: 12px;
padding: 14px;
color: white;
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 700;
cursor: pointer;
transition: opacity .2s;
}

.btn-primary:active { opacity: .8; }

/* ── FAVORITES ── */
.fav-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 8px;
margin-bottom: 16px;
}

.fav-chip {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 12px;
cursor: pointer;
display: flex;
flex-direction: column;
gap: 2px;
transition: border-color .2s;
text-align: left;
}

.fav-chip:active { border-color: var(–accent); }
.fav-chip .f-name { font-size: 13px; font-weight: 500; }
.fav-chip .f-cal { font-size: 12px; color: var(–accent); font-family: ‘Syne’, sans-serif; font-weight: 700; }

/* ── CALENDAR ── */
.cal-header {
display: flex;
align-items: center;
justify-content: space-between;
margin: 0 20px 16px;
}

.cal-nav {
background: var(–surface);
border: 1px solid var(–border);
color: var(–text);
width: 36px; height: 36px;
border-radius: 10px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
}

.cal-month {
font-family: ‘Syne’, sans-serif;
font-size: 18px;
font-weight: 700;
}

.cal-grid {
margin: 0 20px;
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 4px;
}

.cal-day-label {
text-align: center;
font-size: 11px;
color: var(–muted);
padding: 4px 0 8px;
}

.cal-day {
aspect-ratio: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
border-radius: 10px;
cursor: pointer;
font-size: 14px;
transition: background .15s;
gap: 2px;
}

.cal-day:empty { cursor: default; }
.cal-day.has-data { background: var(–surface); }
.cal-day.today { background: rgba(255,107,74,.15); color: var(–accent); font-weight: 700; }
.cal-day.selected { background: var(–accent); color: white; }
.cal-day .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(–green); }
.cal-day.selected .cal-dot { background: white; }

.cal-detail {
margin: 16px 20px 0;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 16px;
}

.cal-detail-title {
font-family: ‘Syne’, sans-serif;
font-size: 14px;
font-weight: 700;
margin-bottom: 12px;
color: var(–muted);
}

/* ── STATS ── */
.stats-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin: 0 20px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 18px 16px;
}

.stat-label { font-size: 12px; color: var(–muted); margin-bottom: 6px; }

.stat-value {
font-family: ‘Syne’, sans-serif;
font-size: 28px;
font-weight: 800;
line-height: 1;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.stat-unit { font-size: 11px; color: var(–muted); margin-top: 4px; }

.stat-card.full {
grid-column: 1 / -1;
}

/* ── SETTINGS ── */
.settings-card {
margin: 0 20px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
overflow: hidden;
}

.setting-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px;
border-bottom: 1px solid var(–border);
}

.setting-row:last-child { border-bottom: none; }
.setting-row-label { font-size: 15px; }
.setting-row-sub { font-size: 12px; color: var(–muted); margin-top: 2px; }

.setting-input {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 6px 10px;
color: var(–text);
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 700;
width: 100px;
text-align: right;
outline: none;
}

.setting-input:focus { border-color: var(–accent); }

/* page transition */
.page { display: none; }
.page.active { display: block; animation: fadeIn .2s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.badge {
display: inline-block;
padding: 2px 8px;
border-radius: 20px;
font-size: 11px;
font-weight: 600;
background: rgba(255,107,74,.15);
color: var(–accent);
}

.badge.green { background: rgba(74,222,128,.15); color: var(–green); }

.fav-section-title {
font-size: 12px;
color: var(–muted);
margin-bottom: 10px;
padding-top: 4px;
}

.fav-item-row {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
margin-bottom: 8px;
}

.no-fav { color: var(–muted); font-size: 13px; text-align: center; padding: 20px 0; }

.streak-card {
margin: 12px 20px 0;
background: linear-gradient(135deg, rgba(255,90,54,.07), rgba(255,159,28,.07));
border: 1px solid rgba(255,90,54,.15);
border-radius: var(–radius);
padding: 16px;
display: flex;
align-items: center;
gap: 12px;
}

.streak-icon { font-size: 32px; }
.streak-text .s-title { font-family: ‘Syne’, sans-serif; font-size: 14px; font-weight: 700; }
.streak-text .s-sub { font-size: 12px; color: var(–muted); margin-top: 2px; }
</style>

</head>

<script>
// ── DATA ──
const KEY_RECORDS = 'ct_records';
const KEY_GOAL = 'ct_goal';
const KEY_FAVS = 'ct_favs';
const KEY_EX_FAVS = 'ct_ex_favs';
const KEY_GYM = 'ct_gym';

function getGym() { try { return JSON.parse(localStorage.getItem(KEY_GYM) || '{}'); } catch(e) { return {}; } }
function saveGym(g) { localStorage.setItem(KEY_GYM, JSON.stringify(g)); }
function getGymFee() { return parseInt(localStorage.getItem('ct_gym_fee') || '7700'); }
function saveGymFee() { const v = parseInt(document.getElementById('gym-fee-input').value); if(v>0) localStorage.setItem('ct_gym_fee', v); }
function getGymGoal() { return parseInt(localStorage.getItem('ct_gym_goal') || '20'); }
function saveGymGoal() { const v = parseInt(document.getElementById('gym-goal-input').value); if(v>0) localStorage.setItem('ct_gym_goal', v); }

function getRecords() { try { return JSON.parse(localStorage.getItem(KEY_RECORDS) || '{}'); } catch(e) { return {}; } }
function saveRecords(r) { localStorage.setItem(KEY_RECORDS, JSON.stringify(r)); }
function getGoal() { return parseInt(localStorage.getItem(KEY_GOAL) || '2000'); }
function getFavs() { try { return JSON.parse(localStorage.getItem(KEY_FAVS) || '[]'); } catch(e) { return []; } }
function saveFavs(f) { localStorage.setItem(KEY_FAVS, JSON.stringify(f)); }
function getExFavs() { try { return JSON.parse(localStorage.getItem(KEY_EX_FAVS) || '[]'); } catch(e) { return []; } }
function saveExFavs(f) { localStorage.setItem(KEY_EX_FAVS, JSON.stringify(f)); }

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTodayData() {
  const r = getRecords();
  const k = todayKey();
  if (!r[k]) r[k] = { meals: [], exercise: [] };
  return r[k];
}

function saveTodayData(data) {
  const r = getRecords();
  r[todayKey()] = data;
  saveRecords(r);
}

// ── NAV ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');

  const fab = document.getElementById('fab');
  fab.style.display = name === 'today' ? 'flex' : 'none';

  if (name === 'today') renderToday();
  if (name === 'calendar') renderCalendar();
  if (name === 'stats') renderStats();
  if (name === 'favorites') renderFavs();
  if (name === 'settings') renderSettings();
}

// ── TODAY ──
function renderToday() {
  const data = getTodayData();
  const goal = getGoal();
  const totalFood = data.meals.reduce((s, m) => s + m.cal, 0);
  const totalEx = data.exercise.reduce((s, e) => s + e.cal, 0);
  const net = totalFood - totalEx;

  // Date label
  const d = new Date();
  const label = `${d.getMonth()+1}月${d.getDate()}日（${'日月火水木金土'[d.getDay()]}）`;
  document.getElementById('today-date-label').textContent = label;

  const remaining = goal - net;
  if (remaining > 0) {
    document.getElementById('today-subtitle').textContent = `目標まであと ${remaining.toLocaleString()} kcal`;
    document.getElementById('today-badge').innerHTML = '<span class="badge green">目標内</span>';
  } else {
    document.getElementById('today-subtitle').textContent = `目標を ${Math.abs(remaining).toLocaleString()} kcal オーバー`;
    document.getElementById('today-badge').innerHTML = '<span class="badge">オーバー</span>';
  }

  // Ring
  document.getElementById('ring-cal').textContent = net.toLocaleString();
  document.getElementById('ring-goal').textContent = goal.toLocaleString() + ' kcal';
  document.getElementById('ring-food').textContent = totalFood.toLocaleString() + ' kcal';
  document.getElementById('ring-exercise').textContent = '-' + totalEx.toLocaleString() + ' kcal';

  const pct = Math.min(net / goal, 1);
  const circ = 301.6;
  document.getElementById('ring-circle').style.strokeDashoffset = circ - circ * pct;
  document.getElementById('ring-circle').style.stroke = pct >= 1 ? '#ff4a4a' : 'url(#ringGrad)';

  const foodPct = goal > 0 ? Math.min(totalFood / goal * 100, 100) : 0;
  document.getElementById('pct-food').style.width = foodPct + '%';

  // Gym card
  renderGymCard();

  // Streak
  const streak = calcStreak();
  document.getElementById('streak-title').textContent = streak > 0 ? `${streak}日連続記録中！` : '今日から記録スタート！';
  document.getElementById('streak-sub').textContent = streak > 0 ? `継続は力なり 💪` : 'まずは食事を追加してみよう';

  // Meal list
  const mealEl = document.getElementById('today-meals');
  if (data.meals.length === 0) {
    mealEl.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
  } else {
    mealEl.innerHTML = data.meals.map((m, i) => `
      <div class="food-item">
        <div>
          <div class="food-name">${esc(m.name)}</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="food-cal">${m.cal.toLocaleString()}<span> kcal</span></div>
          <button class="food-del" onclick="deleteMeal(${i})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  // Exercise list
  const exEl = document.getElementById('today-exercise');
  if (data.exercise.length === 0) {
    exEl.innerHTML = '<div class="empty-state">まだ記録がありません</div>';
  } else {
    exEl.innerHTML = data.exercise.map((e, i) => `
      <div class="food-item">
        <div>
          <div class="food-name">${esc(e.name)}</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="food-cal" style="color:var(--green)">-${e.cal.toLocaleString()}<span> kcal</span></div>
          <button class="food-del" onclick="deleteExercise(${i})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }
}

function renderGymCard() {
  const key = todayKey();
  const gym = getGym();
  const visited = gym[key] === true;
  const el = document.getElementById('gym-card');
  el.innerHTML = `
    <div class="food-item" style="justify-content:space-between">
      <div>
        <div class="food-name">${visited ? '✅ 今日はジムに行った！' : '今日ジムに行きましたか？'}</div>
        <div class="food-tag">${gymMonthCount()}回 / 今月</div>
      </div>
      <button onclick="toggleGym()" style="
        background:${visited ? 'var(--surface2)' : 'linear-gradient(135deg,var(--accent),var(--accent2))'};
        border:1px solid var(--border);
        border-radius:10px;
        padding:8px 16px;
        color:${visited ? 'var(--muted)' : 'white'};
        font-family:'Syne',sans-serif;
        font-weight:700;
        font-size:14px;
        cursor:pointer;
      ">${visited ? '取消' : '行った！'}</button>
    </div>
  `;
}

function toggleGym() {
  const key = todayKey();
  const gym = getGym();
  gym[key] = !gym[key];
  saveGym(gym);
  renderGymCard();
  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

function gymMonthCount() {
  const gym = getGym();
  const now = new Date();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return Object.keys(gym).filter(k => k.startsWith(prefix) && gym[k]).length;
}

function calcStreak() {
  const records = getRecords();
  let streak = 0;
  let d = new Date();
  d.setDate(d.getDate() - 1);
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const rec = records[k];
    if (rec && (rec.meals.length > 0 || rec.exercise.length > 0)) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function deleteMeal(i) {
  const data = getTodayData();
  data.meals.splice(i, 1);
  saveTodayData(data);
  renderToday();
}

function deleteExercise(i) {
  const data = getTodayData();
  data.exercise.splice(i, 1);
  saveTodayData(data);
  renderToday();
}

// ── MODAL ──
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  const key = todayKey();
  document.getElementById('input-date').value = key;
  document.getElementById('input-gym-check').checked = getGym()[key] === true;
  renderFavQuick();
  renderExFavQuick();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('input-food-name').value = '';
  document.getElementById('input-food-cal').value = '';
  document.getElementById('input-fav-check').checked = false;
  document.getElementById('input-ex-name').value = '';
  document.getElementById('input-ex-cal').value = '';
  document.getElementById('input-ex-fav-check').checked = false;
  document.getElementById('input-gym-check').checked = false;
}

function updateGymCheck() {
  const date = document.getElementById('input-date').value;
  document.getElementById('input-gym-check').checked = getGym()[date] === true;
}

function saveGymFromModal() {
  const date = document.getElementById('input-date').value || todayKey();
  const gym = getGym();
  gym[date] = document.getElementById('input-gym-check').checked;
  saveGym(gym);
}

function closeModalIfOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function switchTab(tab) {
  document.getElementById('modal-meal').style.display = tab === 'meal' ? 'block' : 'none';
  document.getElementById('modal-exercise').style.display = tab === 'exercise' ? 'block' : 'none';
  document.getElementById('tab-meal').className = 'tab' + (tab === 'meal' ? ' active' : '');
  document.getElementById('tab-exercise').className = 'tab' + (tab === 'exercise' ? ' active' : '');
}

function renderFavQuick() {
  const favs = getFavs();
  const el = document.getElementById('fav-quick');
  if (favs.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="fav-section-title">⭐ お気に入りから選ぶ</div>
    <div class="fav-grid">${favs.map((f,i) => `
      <button class="fav-chip" onclick="selectFav(${i})">
        <span class="f-name">${esc(f.name)}</span>
        <span class="f-cal">${f.cal} kcal</span>
      </button>
    `).join('')}</div>`;
}

function selectFav(i) {
  const f = getFavs()[i];
  document.getElementById('input-food-name').value = f.name;
  document.getElementById('input-food-cal').value = f.cal;
}

function addMeal() {
  const name = document.getElementById('input-food-name').value.trim();
  const cal = parseInt(document.getElementById('input-food-cal').value);
  const date = document.getElementById('input-date').value || todayKey();
  if (!name || !cal || cal <= 0) return alert('食品名とカロリーを入力してください');

  const r = getRecords();
  if (!r[date]) r[date] = { meals: [], exercise: [] };
  r[date].meals.push({ name, cal });
  saveRecords(r);

  if (document.getElementById('input-fav-check').checked) {
    const favs = getFavs();
    if (!favs.find(f => f.name === name)) {
      favs.push({ name, cal });
      saveFavs(favs);
    }
  }

  saveGymFromModal();
  closeModal();
  renderToday();
}

function renderExFavQuick() {
  const favs = getExFavs();
  const el = document.getElementById('ex-fav-quick');
  if (favs.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="fav-section-title">⭐ お気に入りから選ぶ</div>
    <div class="fav-grid">${favs.map((f,i) => `
      <button class="fav-chip" onclick="selectExFav(${i})">
        <span class="f-name">${esc(f.name)}</span>
        <span class="f-cal">-${f.cal} kcal</span>
      </button>
    `).join('')}</div>`;
}

function selectExFav(i) {
  const f = getExFavs()[i];
  document.getElementById('input-ex-name').value = f.name;
  document.getElementById('input-ex-cal').value = f.cal;
}

function addExercise() {
  const name = document.getElementById('input-ex-name').value.trim();
  const cal = parseInt(document.getElementById('input-ex-cal').value);
  const date = document.getElementById('input-date').value || todayKey();
  if (!name || !cal || cal <= 0) return alert('運動名と消費カロリーを入力してください');

  const r = getRecords();
  if (!r[date]) r[date] = { meals: [], exercise: [] };
  r[date].exercise.push({ name, cal });
  saveRecords(r);

  if (document.getElementById('input-ex-fav-check').checked) {
    const favs = getExFavs();
    if (!favs.find(f => f.name === name)) {
      favs.push({ name, cal });
      saveExFavs(favs);
    }
  }

  saveGymFromModal();
  closeModal();
  renderToday();
}

// ── CALENDAR ──
let calYear, calMonth;

function renderCalendar() {
  const now = new Date();
  if (calYear === undefined) { calYear = now.getFullYear(); calMonth = now.getMonth(); }

  const records = getRecords();
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent = `${calYear}年 ${months[calMonth]}`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  let html = ['日','月','火','水','木','金','土'].map(d => `<div class="cal-day-label">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) html += '<div></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const k = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = records[k];
    const hasData = rec && (rec.meals.length > 0 || rec.exercise.length > 0);
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();

    let cls = 'cal-day';
    if (hasData) cls += ' has-data';
    if (isToday) cls += ' today';

    html += `<div class="${cls}" onclick="showCalDay('${k}', ${d})">${d}${hasData ? '<div class="cal-dot"></div>' : ''}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-detail').style.display = 'none';
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function showCalDay(key, day) {
  document.querySelectorAll('.cal-day').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  showCalDayByKey(key, day);
}



function toggleGymDate(key) {
  const gym = getGym();
  gym[key] = !gym[key];
  saveGym(gym);
  // Re-render the day detail
  const parts = key.split('-');
  showCalDayByKey(key, parseInt(parts[2]));
  renderToday();
}

function showCalDayByKey(key, day) {
  const rec = getRecords()[key];
  const detail = document.getElementById('cal-detail');
  const parts = key.split('-');
  const month = parseInt(parts[1]);

  if (!rec || (rec.meals.length === 0 && rec.exercise.length === 0)) {
    const gym = getGym();
    const gymVisited = gym[key] === true;
    let html = `<div class="cal-detail-title">${month}月${day}日</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
        <span style="font-size:14px">🏋️ ジム</span>
        <button onclick="toggleGymDate('${key}')" style="
          background:${gymVisited ? 'var(--surface2)' : 'linear-gradient(135deg,var(--accent),var(--accent2))'};
          border:1px solid var(--border);
          border-radius:10px;
          padding:6px 14px;
          color:${gymVisited ? 'var(--muted)' : 'white'};
          font-family:'Syne',sans-serif;
          font-weight:700;
          font-size:13px;
          cursor:pointer;
        ">${gymVisited ? '✅ 行った！' : '行った？'}</button>
      </div>`;
    detail.innerHTML = html;
    detail.style.display = 'block';
    return;
  }

  const totalFood = rec.meals.reduce((s, m) => s + m.cal, 0);
  const totalEx = rec.exercise.reduce((s, e) => s + e.cal, 0);
  const net = totalFood - totalEx;
  let html = `<div class="cal-detail-title">${month}月${day}日 ─ 正味 ${net.toLocaleString()} kcal</div>`;

  if (rec.meals.length > 0) {
    html += rec.meals.map(m => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${esc(m.name)}</span>
        <span style="font-family:'Syne',sans-serif;color:var(--accent);font-size:14px;font-weight:700">${m.cal} kcal</span>
      </div>`).join('');
  }
  if (rec.exercise.length > 0) {
    html += rec.exercise.map(e => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">🏃 ${esc(e.name)}</span>
        <span style="font-family:'Syne',sans-serif;color:var(--green);font-size:14px;font-weight:700">-${e.cal} kcal</span>
      </div>`).join('');
  }

  const gym = getGym();
  const gymVisited = gym[key] === true;
  html += `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
      <span style="font-size:14px">🏋️ ジム</span>
      <button onclick="toggleGymDate('${key}')" style="
        background:${gymVisited ? 'var(--surface2)' : 'linear-gradient(135deg,var(--accent),var(--accent2))'};
        border:1px solid var(--border);
        border-radius:10px;
        padding:6px 14px;
        color:${gymVisited ? 'var(--muted)' : 'white'};
        font-family:'Syne',sans-serif;
        font-weight:700;
        font-size:13px;
        cursor:pointer;
      ">${gymVisited ? '✅ 行った！' : '行った？'}</button>
    </div>
  `;

  detail.innerHTML = html;
  detail.style.display = 'block';
}

// ── STATS ──
function renderStats() {
  const records = getRecords();
  const keys = Object.keys(records).sort();

  let totalFood = 0, totalEx = 0, days = 0;
  const goal = getGoal();
  let withinGoal = 0;

  keys.forEach(k => {
    const rec = records[k];
    if (!rec || (rec.meals.length === 0 && rec.exercise.length === 0)) return;
    const f = rec.meals.reduce((s,m) => s + m.cal, 0);
    const e = rec.exercise.reduce((s,ex) => s + ex.cal, 0);
    totalFood += f;
    totalEx += e;
    days++;
    if (f - e <= goal) withinGoal++;
  });

  const avg = days > 0 ? Math.round((totalFood - totalEx) / days) : 0;
  const streak = calcStreak();
  const gymFee = getGymFee();
  const gymCount = gymMonthCount();
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const gymGoalPct = Math.round(gymCount / daysInMonth * 100);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">記録日数</div>
      <div class="stat-value">${days}</div>
      <div class="stat-unit">日</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">連続記録</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-unit">日 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">1日平均摂取</div>
      <div class="stat-value">${avg.toLocaleString()}</div>
      <div class="stat-unit">kcal / 日</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">目標達成率</div>
      <div class="stat-value">${days > 0 ? Math.round(withinGoal/days*100) : 0}</div>
      <div class="stat-unit">%</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">累計摂取カロリー（正味）</div>
      <div class="stat-value">${(totalFood - totalEx).toLocaleString()}</div>
      <div class="stat-unit">kcal 合計</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">累計運動消費カロリー</div>
      <div class="stat-value">-${totalEx.toLocaleString()}</div>
      <div class="stat-unit">kcal 合計 🏃</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">今月のジム回数</div>
      <div class="stat-value">${gymCount}</div>
      <div class="stat-unit">回 🏋️</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">今月の達成率</div>
      <div class="stat-value">${gymGoalPct}</div>
      <div class="stat-unit">% (${gymCount}回 / ${daysInMonth}日)</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">1回あたりのジム費用</div>
      <div class="stat-value">${gymCount > 0 ? Math.round(gymFee / gymCount).toLocaleString() : '—'}</div>
      <div class="stat-unit">円 / 回（月額${gymFee.toLocaleString()}円）</div>
    </div>
  `;
}

// ── FAVORITES ──
function renderFavs() {
  const favs = getFavs();
  const el = document.getElementById('fav-list');
  if (favs.length === 0) {
    el.innerHTML = '<div class="no-fav">お気に入りはまだありません。<br>食事追加時に⭐チェックで登録できます。</div>';
    return;
  }
  el.innerHTML = favs.map((f, i) => `
    <div class="fav-item-row">
      <div>
        <div style="font-size:15px;font-weight:500">${esc(f.name)}</div>
        <div style="font-size:13px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;margin-top:2px">${f.cal} kcal</div>
      </div>
      <button class="food-del" onclick="deleteFav(${i})" style="color:var(--muted)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  `).join('');
}

function deleteFav(i) {
  const favs = getFavs();
  favs.splice(i, 1);
  saveFavs(favs);
  renderFavs();
}

// ── SETTINGS ──
function renderSettings() {
  document.getElementById('goal-input').value = getGoal();
  document.getElementById('gym-fee-input').value = getGymFee();
}

function saveGoal() {
  const v = parseInt(document.getElementById('goal-input').value);
  if (v > 0) localStorage.setItem(KEY_GOAL, v);
}

// ── UTIL ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
renderToday();
</script>

</body>
</html>
